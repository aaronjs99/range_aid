simulation:
  steps: 185
  dt: 0.2
  seed: 7

estimator:
  optimizer_backend: "cora"
  # "full" estimates a moving target trajectory with smoothness and optional
  # USBL angles. "cora" solves stationary ping windows with a dense lifted SDP.
  # This is only the optimizer start point direction/offset before using all
  # factors. It is not a B odometry/dead-reckoning measurement.
  initial_guess_offset_m: [6.0, -4.0, -2.0]
  initial_guess_velocity_mps: [0.2, 0.05, -0.02]
  use_smoothness_factor: true
  smoothness_accel_sigma_mps2: 0.35
  # Depth is intentionally off by default. Turn this on only for experiments
  # where the target has an independent depth measurement.
  use_depth_factor: false
  depth_sigma_m: 0.10
  use_usbl_angles: true

  # Range alone leaves two tangent directions on each range sphere unobservable.
  # This display sigma is a finite visualization of that ambiguity, not a
  # sensor datasheet value.
  tangent_uncertainty_sigma_m: 0.35

  cora_window_size: 25
  cora_solve_stride: 5
  cora_range_slack_weight: 1.0
  cora_boat_prior_weight: 100.0
  cora_boat_displacement_weight: 25.0
  cora_surface_prior_weight: 4.0
  cora_surface_z_m: 0.0
  cora_surface_sigma_m: 2.0

  # SDP diagnostic gates. These decide whether a solved relaxation is valid
  # enough for rank/certificate language; local refinement may still run when
  # the SDP diagnostic is invalid or inconclusive.
  cora_rank_tightness_tol: 1e-3
  cora_sdp_feasibility_tol: 1e-3
  cora_sdp_objective_tol: 1e-6
  cora_sdp_psd_tol: 1e-5
  cora_refine_with_full: true
  cora_solver: "SCS"

  # Optional fixed calibration mismatch. Measurements are generated with the
  # biased true mount; optimizers use the nominal calibrated mount below.
  usbl_mount_bias_m: [0.0, 0.0, 0.0]
  usbl_mount_bias_rpy_deg: [0.0, 0.0, 0.0]
  usbl_mount_prior_sigma_m: 0.02
  usbl_mount_prior_sigma_deg: [0.25, 0.25, 0.50]

sensors:
  boat:
    usbl:
      name: "Sonardyne MRT Type 8243"
      role: "Boat-mounted submerged USBL transceiver"
      frequency_band_khz: [20.0, 34.0]
      max_range_m: 995.0
      depth_rating_m: 25.0
      acoustic_coverage_deg: 200.0
      range_sigma_m: 0.015
      angular_accuracy_deg: 3.0
      update_rate_hz: 3.0
      weight_air_kg: 1.84
      weight_water_kg: 0.99
      typical_power_w: 1.5
      max_power_w: 25.5
      mount_offset_m: [0.6, 0.0, -0.75]
      mount_rpy_deg: [0.0, 0.0, 0.0]
      notes:
        - "Range sigma models raw range precision, not final system position accuracy."
        - "Full Micro-Ranger 2 system position accuracy is much looser than 15 mm."
      transmit_source_level_db_re_1upa_at_1m: 184.0
      electrical:
        voltage_vdc: 48.0
        voltage_tolerance_percent: 10.0
        typical_power_w: 1.5
        max_power_w: 25.5
      communication: "Ethernet 100 Mbps"
      operating_temperature_c: [-5.0, 40.0]
      storage_temperature_c: [-20.0, 55.0]
      construction: ["Stainless steel 316", "PVC", "polyurethane"]
      dimensions_height_diameter_mm: [177.0, 106.0]
      weight_air_water_kg: [1.84, 0.99]
    imu:
      name: "Xsens MTi-30 AHRS"
      role: "Boat attitude/heading reference for the DLiO-style A pose source"
      source: "Xsens MTi public output specifications"
      roll_pitch_rms_static_deg: 0.2
      roll_pitch_rms_dynamic_deg: 0.5
      yaw_rms_dynamic_deg: 1.0
      gyro_standard_full_range_deg_s: 450.0
      gyro_initial_bias_error_deg_s: 0.2
      gyro_in_run_bias_stability_deg_h: 18.0
      gyro_bandwidth_hz: 415.0
      gyro_noise_density_deg_s_sqrt_hz: 0.03
      accelerometer_standard_full_range_m_s2: 200.0
      output_orientation: ["Euler angles", "quaternion", "rotation matrix"]
      notes:
        - "Yaw performance assumes suitable filter profile and magnetic conditions."
        - "The demo covariance below is intentionally not a full datasheet-derived DLiO covariance model."
    lidar:
      name: "Velodyne VLP-16 Puck"
      role: "Boat 3D lidar for the DLiO-style A pose source"
      source: "Velodyne VLP-16 public datasheet"
      channels: 16
      measurement_range_m: 100.0
      typical_accuracy_m: 0.03
      points_per_second: 300000
      horizontal_fov_deg: 360.0
      vertical_fov_deg: 30.0
      vertical_fov_limits_deg: [-15.0, 15.0]
      vertical_angular_resolution_deg: 2.0
      horizontal_angular_resolution_deg: [0.1, 0.4]
      rotation_rate_hz: [5.0, 20.0]
      returns: ["strongest", "last"]
      power_w: 8.0
      weight_g: 830.0
      dimensions_diameter_height_mm: [103.0, 72.0]
      ingress_protection: "IP67"
      operating_temperature_c: [-10.0, 60.0]
  target:
    transponder:
      name: "Sonardyne Nano Cabled Transponder"
      role: "Underwater tracked target transponder"
      frequency_band_khz: [19.0, 34.0]
      max_range_m: 995.0
      depth_rating_m: 500.0
      beam_shape_deg: 260.0
      range_precision_m: 0.015
      weight_air_kg: 0.584
      weight_water_kg: 0.162

covariance:
  # Demo-level assumed DLiO/VLP-16 + Xsens covariance for object A.
  # This is not a datasheet or calibration claim.
  a_position_sigma_m: [0.08, 0.08, 0.05]
  a_orientation_sigma_deg: [1.0, 1.0, 2.0]

scenario:
  # B moves before/between/after these ping events and is stationary only during
  # each index interval. CORA only uses valid measurements inside these windows.
  # The durations intentionally vary: 3.0 s, 4.0 s, 3.0 s, 4.8 s, and 1.6 s.
  stationary_ping_windows:
    - [20, 35]
    - [45, 65]
    - [113, 128]
    - [132, 156]
    - [157, 165]
  b_event_start_offset_m: [-4.0, 3.0, -2.5]
  b_event_stationary_position_m: [-2.25, -2.0, -8.0]
  b_event_end_position_m: [2.0, -4.0, -10.0]

  # Used by the full backend baseline.
  b_start_position_m: [-2.0, 1.5, -2.2]
  b_velocity_mps: [0.42, -0.06, -0.01]
  b_motion_amplitude_m: [0.9, 1.1, 0.35]
  b_motion_frequency_radps: [0.55, 0.38, 0.7]
  b_motion_phase_deg: [20.0, 115.0, 40.0]

output:
  output_dir: "outputs"
  summary_file: "results.txt"
  summary_plot_file: "range_aided_pose_estimation.png"
  position_plot_file: "position_estimate.png"
  video_file: "range_aided_pose_estimation_views.mp4"
