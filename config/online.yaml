schema_version: 1

# The online system is shadow-only. No value in this file can authorize a TF,
# navigation-state, or map-frame publication.
smoother:
  lag_sec: 12.0
  max_pose_count: 160
  state_rate_hz: 10.0
  max_sync_error_sec: 0.20

noise:
  odometry_translation_sigma_m: 0.08
  odometry_rotation_sigma_rad: 0.035
  boundary_translation_sigma_m: 0.15
  boundary_rotation_sigma_rad: 0.07
  range_default_sigma_m: 0.20
  robust_range_huber_k: 1.5

gates:
  min_range_m: 0.5
  max_range_m: 995.0
  min_measurements: 6
  min_translational_rank: 2
  max_observability_condition: 250.0
  max_range_residual_rms_m: 0.75
  max_correction_translation_m: 2.0
  max_correction_rotation_rad: 0.35

certification:
  period_sec: 3.0
  max_age_sec: 15.0
  require_tight_for_candidate: true
  solver: SCS

# Separate future USBL transform. This is not the imaging-sonar frame and does
# not publish a real transform. Replace only after physical measurement.
sensor_extrinsic:
  translation_m: [0.6, 0.0, -0.75]
  rotation_rpy_rad: [0.0, 0.0, 0.0]

# Simulation/research landmark. Real operation requires a surveyed landmark
# and its uncertainty; the imaging sonar does not provide this measurement.
landmarks:
  sim_transponder_0:
    position_m: [30.0, -2.0, -4.0]
    prior_sigma_m: 0.05
